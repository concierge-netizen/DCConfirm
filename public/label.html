<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Label Generator — HANDS Logistics</title>
<link href="https://fonts.googleapis.com/css2?family=Bebas+Neue&family=DM+Sans:wght@300;400;500;600&display=swap" rel="stylesheet">
<style>
:root{--black:#0a0a0a;--dark:#111111;--card:#161616;--border:#2a2a2a;--green:#a0d6b4;--label:#888;--body:#e8e8e8;--font-h:"Bebas Neue",sans-serif;--font-b:"DM Sans",sans-serif}
*{box-sizing:border-box;margin:0;padding:0}
body{background:var(--dark);color:var(--body);font-family:var(--font-b);min-height:100vh}
.hdr{background:var(--black);padding:0 32px;height:56px;display:flex;align-items:center;justify-content:space-between;border-bottom:1px solid var(--border)}
.hdr img{height:28px}
.hdr-title{font-family:var(--font-h);font-size:18px;letter-spacing:2px;color:#fff}
.bar{height:3px;display:flex}
.bar .d{flex:0 0 68%;background:var(--black)}
.bar .g{flex:0 0 32%;background:var(--green)}
.main{max-width:920px;margin:0 auto;padding:40px 24px}
.panel{background:var(--card);border:1px solid var(--border);border-radius:4px;padding:28px 32px;margin-bottom:24px}
.panel h2{font-family:var(--font-h);font-size:22px;letter-spacing:2px;color:#fff;margin-bottom:4px}
.panel p{font-size:13px;color:var(--label);margin-bottom:20px}
.row{display:flex;gap:12px;align-items:flex-end;flex-wrap:wrap}
.ig{display:flex;flex-direction:column;gap:6px;flex:1;min-width:160px}
.ig label{font-size:11px;font-weight:600;letter-spacing:1.5px;text-transform:uppercase;color:var(--label)}
.ig input,.ig select{background:#1e1e1e;border:1px solid var(--border);border-radius:3px;padding:10px 14px;color:var(--body);font-family:var(--font-b);font-size:14px;outline:none;transition:border-color .2s}
.ig input:focus,.ig select:focus{border-color:var(--green)}
.ig select option{background:#1e1e1e}
.btn-go{background:var(--green);color:var(--black);border:none;border-radius:3px;padding:10px 28px;font-family:var(--font-h);font-size:16px;letter-spacing:2px;cursor:pointer;align-self:flex-end;transition:opacity .2s;white-space:nowrap}
.btn-go:hover{opacity:.85}
.btn-go:disabled{opacity:.4;cursor:not-allowed}
.status{padding:12px 16px;border-radius:3px;font-size:13px;margin-bottom:20px;display:none}
.status.err{background:#2a1010;border:1px solid #5a2020;color:#ff8888;display:block}
.status.load{background:#1a1a2a;border:1px solid var(--border);color:var(--label);display:block}
.status.ok{background:#0f1e15;border:1px solid #2a5a3a;color:var(--green);display:block}
.icard{background:var(--card);border:1px solid var(--border);border-radius:4px;padding:20px 24px;margin-bottom:20px;display:none}
.icard.vis{display:block}
.icard-hdr{display:flex;align-items:center;justify-content:space-between;margin-bottom:14px;padding-bottom:14px;border-bottom:1px solid var(--border)}
.icard-name{font-family:var(--font-h);font-size:18px;letter-spacing:1px;color:#fff}
.icard-po{font-size:12px;color:var(--label);margin-top:2px}
.dpill{padding:4px 12px;border-radius:2px;font-size:11px;font-weight:600;letter-spacing:2px;text-transform:uppercase}
.dpill.inbound{background:#fff;color:#000}
.dpill.outbound{background:var(--green);color:#000}
.ifields{display:grid;grid-template-columns:repeat(auto-fill,minmax(170px,1fr));gap:10px 20px}
.ifields label{font-size:10px;font-weight:600;letter-spacing:1.5px;text-transform:uppercase;color:var(--label);display:block;margin-bottom:3px}
.ifields span{font-size:13px;color:var(--body)}
.pact{display:none;gap:12px;flex-wrap:wrap;margin-bottom:24px}
.pact.vis{display:flex}
.pbtn{background:var(--black);color:#fff;border:1px solid var(--border);border-radius:3px;padding:10px 22px;font-family:var(--font-h);font-size:14px;letter-spacing:2px;cursor:pointer;transition:border-color .2s}
.pbtn:hover{border-color:var(--green)}
.pbtn.prim{background:var(--green);color:var(--black);border-color:var(--green)}
.pbtn.prim:hover{opacity:.88}
.pwrap{display:none;flex-direction:column;align-items:flex-start;gap:10px}
.pwrap.vis{display:flex}
.plbl-txt{font-size:11px;font-weight:600;letter-spacing:2px;text-transform:uppercase;color:var(--label)}
/* ══════════════════════════════════════
   4×6 THERMAL LABEL — PURE B&W
   384×576px @96dpi — Arkscan 2054A
   No color fills. Black borders only.
   ══════════════════════════════════════ */
.lbl{
  width:384px;height:576px;background:#fff;color:#000;
  font-family:'DM Sans',sans-serif;
  position:relative;overflow:hidden;
  border:2px solid #000;flex-shrink:0;
  padding:10px 10px 38px 10px;
}

/* IDENTITY STRIP — logo left, direction right */
.id-strip{display:flex;justify-content:space-between;align-items:center;border:2px solid #000;padding:5px 10px;margin-bottom:7px;}
.id-logo{width:90px;height:auto;display:block;}
.id-type{font-family:'Bebas Neue',Impact,sans-serif;font-size:17px;letter-spacing:3px;color:#000;text-align:right;}

/* HERO BOX */
.hero-box{border:3px solid #000;padding:6px 10px;margin-bottom:6px;}
.hero-label{font-size:8px;font-weight:700;letter-spacing:2px;text-transform:uppercase;color:#000;margin-bottom:1px;}
.hero-val{font-family:'Bebas Neue',Impact,sans-serif;font-size:26px;letter-spacing:1px;color:#000;line-height:1.05;word-break:break-word;}

/* GENERIC BOX */
.row2{display:flex;gap:5px;margin-bottom:5px;}
.box{border:2px solid #000;padding:4px 7px;flex:1;min-width:0;}
.box.wide{flex:2;}
.bkey{font-size:8px;font-weight:700;letter-spacing:1.5px;text-transform:uppercase;color:#000;margin-bottom:1px;}
.bval{font-size:11px;font-weight:600;color:#000;line-height:1.25;word-break:break-word;}
.bval.lg{font-size:13px;font-weight:700;}

/* ADDRESS */
.addr-box{border:2px solid #000;padding:4px 7px;margin-bottom:5px;}
.addr-box .bval{font-size:10px;font-weight:500;line-height:1.5;}

/* PURPOSE — dashed */
.purpose-box{border:2px dashed #000;padding:4px 7px;margin-bottom:5px;}
.purpose-box .bval{font-size:11px;font-weight:700;}
.purpose-box .bval.pending{font-weight:400;font-style:italic;color:#555;font-size:10px;}

/* CARRIER */
.carrier-row{display:flex;gap:5px;margin-bottom:5px;}
.carr-name{border:2px solid #000;padding:4px 9px;flex:0 0 auto;}
.carr-name .bval{font-family:'Bebas Neue',Impact,sans-serif;font-size:16px;letter-spacing:1.5px;}
.carr-track{border:2px solid #000;padding:4px 7px;flex:1;min-width:0;}
.carr-track .bval{font-size:9px;font-weight:600;word-break:break-all;line-height:1.35;}

/* COUNTS */
.count-row{display:flex;gap:5px;margin-bottom:5px;}
.count-box{border:2px solid #000;padding:3px 4px;flex:1;text-align:center;}
.count-box .bval{font-family:'Bebas Neue',Impact,sans-serif;font-size:17px;}

/* CONTENTS */
.contents-box{border:2px solid #000;border-left:5px solid #000;padding:4px 7px;margin-bottom:5px;}
.contents-box .bval{font-size:10px;font-weight:500;line-height:1.35;}

/* SPECIAL */
.special-box{border:2px solid #000;padding:4px 7px;margin-bottom:5px;}
.special-box .bval{font-size:10px;font-weight:600;line-height:1.35;}

/* HANDLER ROW */
.handler-row{display:flex;gap:5px;margin-bottom:5px;}
.handler-box{border:2px solid #000;padding:4px 7px;flex:1;display:flex;align-items:center;gap:5px;}
.h-init{width:17px;height:17px;border:2px solid #000;border-radius:50%;display:flex;align-items:center;justify-content:center;font-size:6px;font-weight:700;flex-shrink:0;}
.h-name{font-size:9px;font-weight:700;}

/* FOOTER — logo + address, absolutely positioned at bottom */
.lbl-foot{
  position:absolute;bottom:0;left:0;right:0;
  border-top:2px solid #000;
  padding:4px 10px;
  display:flex;align-items:center;justify-content:space-between;
  background:#fff;height:36px;
}
.foot-logo{height:22px;width:auto;}
.foot-addr{font-size:7.5px;font-weight:600;color:#000;line-height:1.45;text-align:right;}

@media print{
  @page{size:4in 6in;margin:0;}
  body,html{background:#fff!important;}
  .topbar,.acc,.ctrl-card,.lbl-bar,.prbtn,.smsg{display:none!important;}
  .ui{padding:0;max-width:none;}
  .preview{background:#fff;padding:0;gap:0;display:block;}
  .lbl{border:none;width:4in;height:6in;padding-bottom:38px;
       page-break-after:always;page-break-inside:avoid;
       display:block;margin:0;}
  .lbl:last-of-type{page-break-after:avoid;}
}
@media print{
  @page{size:4in 6in;margin:0}
  body{background:#fff}
  .hdr,.bar,.panel,.status,.icard,.pact,.plbl-txt{display:none!important}
  .pwrap{display:flex!important}
  .lbl{width:4in;height:6in;box-shadow:none;border:2px solid #000}
}
</style>
</head>

<main class="main">

  <div class="panel">
    <h2>Generate Package Label</h2>
    <p>Enter a PO number to pull item data from monday.com and generate a print-ready 4&times;6 thermal label.</p>
    <div class="row">
      <div class="ig">
        <label>PO Number / Item ID</label>
        <input type="text" id="poi" placeholder="e.g. 11606002586" autocomplete="off">
      </div>
      <div class="ig" style="max-width:170px">
        <label>Label Type</label>
        <select id="ltype">
          <option value="auto">Auto-detect</option>
          <option value="outbound">Outbound</option>
          <option value="inbound">Inbound</option>
        </select>
      </div>
      <button class="btn-go" id="btngo">Generate Label</button>
    </div>
  </div>

  <div class="status" id="smsg"></div>

  <div class="icard" id="icard">
    <div class="icard-hdr">
      <div>
        <div class="icard-name" id="cname"></div>
        <div class="icard-po" id="cpo"></div>
      </div>
      <div class="dpill" id="cpill"></div>
    </div>
    <div class="ifields" id="cfields"></div>
  </div>

  <div class="pact" id="pact">
    <button class="pbtn prim" onclick="window.print()">&#9112; Print Label</button>
    <button class="pbtn" onclick="doReset()">&#8635; New Label</button>
  </div>

  <div class="pwrap" id="pwrap">
    <div class="plbl-txt">Print Preview &mdash; 4&Prime; &times; 6&Prime; Thermal Label</div>
    <div class="label" id="lout"></div>
  </div>

var poi=document.getElementById('poi'),
    ltype=document.getElementById('ltype'),
    btngo=document.getElementById('btngo'),
    smsg=document.getElementById('smsg'),
    icard=document.getElementById('icard'),
    pact=document.getElementById('pact'),
    pwrap=document.getElementById('pwrap'),
    lout=document.getElementById('lout');

poi.addEventListener('keydown',function(e){if(e.key==='Enter')go();});

function st(cls,msg){smsg.className='status '+cls;smsg.textContent=msg;}
function doReset(){smsg.className='status';icard.classList.remove('vis');pact.classList.remove('vis');pwrap.classList.remove('vis');lout.innerHTML='';poi.value='';poi.focus();}

function go(){
  var po=poi.value.trim();
  if(!po){st('err','Please enter a PO number.');return;}
  btngo.disabled=true;
  st('load','Looking up PO #'+po+'...');
  icard.classList.remove('vis');pact.classList.remove('vis');pwrap.classList.remove('vis');

  fetch(LOOKUP_ENDPOINT+'?po='+encodeURIComponent(po))
  .then(function(r){return r.json().then(function(j){return{ok:r.ok,data:j};});})
  .then(function(res){
    btngo.disabled=false;
    if(!res.ok){st('err',res.data && res.data.error ? res.data.error : 'Lookup failed');return;}
    var d=res.data;
    if(!d || !d.poNumber){st('err','Item not found for PO #'+po);return;}
    st('ok','Found: PO #'+d.poNumber+' — '+d.itemName);
    renderCard(d);renderLabel(d);
  })
  .catch(function(e){btngo.disabled=false;st('err','Connection error: '+e.message);});
}

function getDir(d){
  var s=ltype.value;if(s!=='auto')return s;
  var p=(d.projectName||'').toUpperCase(),n=(d.itemName||'').toUpperCase();
  if(p.indexOf('OUTBOUND')>-1||n.indexOf('OUTBOUND')>-1)return 'outbound';
  if(p.indexOf('INBOUND')>-1||n.indexOf('INBOUND')>-1)return 'inbound';
  return 'outbound';
}

function renderCard(d){
  var dv=getDir(d);
  document.getElementById('cname').textContent=d.itemName||'';
  document.getElementById('cpo').textContent='PO #'+d.poNumber;
  var pill=document.getElementById('cpill');
  pill.innerHTML=dv==='inbound'?'&#9660; Inbound':'&#9650; Outbound';
  pill.className='dpill '+dv;
  var ff=[['Account',d.account],['Project / Event',d.projectName],['Client',d.clientName],['Delivery Date',d.deliveryDate],['Delivery Time',d.deliveryTime],['Address',d.deliveryAddress]];
  document.getElementById('cfields').innerHTML=ff.map(function(f){return'<div><label>'+f[0]+'</label><span>'+(f[1]||'—')+'</span></div>';}).join('');
  icard.classList.add('vis');pact.classList.add('vis');
}

function esc(v){return(v||'').replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;');}
function fld(l,v,full){return'<div'+(full?' class="full"':'')+'><div class="lfl">'+l+'</div><div class="lfv">'+esc(v||'')+'</div></div>';}

function qrBox(){
  var p='<div class="qb"></div><div class="qb"></div><div class="qb"></div><div class="qw"></div><div class="qb"></div><div class="qb"></div><div class="qw"></div><div class="qb"></div><div class="qb"></div><div class="qw"></div><div class="qb"></div><div class="qb"></div><div class="qw"></div><div class="qw"></div><div class="qb"></div><div class="qw"></div><div class="qb"></div><div class="qw"></div><div class="qb"></div><div class="qb"></div><div class="qb"></div><div class="qw"></div><div class="qb"></div><div class="qb"></div><div class="qw"></div>';
  return'<div class="lqr-box"><div class="qgrid">'+p+'</div><div class="qsl">Scan / QR</div></div>';
}

function ico(path,lbl){
  return'<div class="hic"><svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="#000" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round">'+path+'</svg><span>'+lbl+'</span></div>';
}

function renderLabel(d){
  var dv=getDir(d);
  var rec={
    itemId:d.poNumber,
    itemName:d.itemName,
    account:d.account,
    clientName:d.clientName,
    status:d.logisticsStatus||'',
    carrier:'',
    tracking:'',
    date:d.deliveryDate||'',
    invoiceCode:'',
    address:d.deliveryAddress||'',
    contents:d.description||'',
    instructions:'',
    cartons:'0',
    pallets:'0',
    weight:'0',
    handler:d.receivedBy||'',
    project:d.projectName||'',
    purpose:'',
  };
  if(dv==='inbound'){
    lout.innerHTML=buildInbound(rec);
  } else {
    lout.innerHTML=buildOutbound(rec);
  }
  pwrap.classList.add('vis');
}

function fmtDate(ds){
  if(!ds)return '—';
  try{const d=new Date(ds+'T00:00:00');return d.toLocaleDateString('en-US',{month:'short',day:'numeric',year:'numeric'});}catch{return ds;}
}

function initials(n){if(!n)return '??';const p=n.trim().split(' ');return (p[0][0]+(p[1]?p[1][0]:'')).toUpperCase();}

function carrAbbr(c){
  if(!c)return '3PL';
  const u=c.toUpperCase();
  if(u.includes('FEDEX'))return 'FDX';
  if(u.includes('UPS'))return 'UPS';
  if(u.includes('USPS'))return 'USPS';
  if(u.includes('XPO'))return 'XPO';
  if(u.includes('DHL'))return 'DHL';
  return c.substring(0,5).toUpperCase();
}

const FOOT = '<div class="lbl-foot"><img class="foot-logo" src="' + LOGO_SRC + '" alt="HANDS Logistics"><div class="foot-addr">8540 Dean Martin Dr, Suite 160 · Las Vegas, NV 89139<br>concierge@handslogistics.com · +1 (312) 206-6193</div></div>';

function buildInbound(rec){
  const addr=(rec.address||'').split('\n').map(l=>l.trim()).filter(Boolean);
  const hasPurpose = rec.purpose && rec.purpose.trim()!=='';
  const hasSpecial = rec.instructions && rec.instructions.toUpperCase()!=='NONE' && rec.instructions.trim()!=='';
  return '<div class="lbl" data-dir="inbound">' +
    '<div class="id-strip"><img class="id-logo" src="' + LOGO_SRC + '" alt="HANDS Logistics"><div class="id-type">&#9660; INBOUND RECEIPT</div></div>' +
    '<div class="hero-box"><div class="hero-label">Client</div><div class="hero-val">' + (rec.clientName||'—') + '</div></div>' +
    '<div class="row2"><div class="box wide"><div class="bkey">Account / Brand</div><div class="bval lg">' + (rec.account||'—') + '</div></div><div class="box"><div class="bkey">Received</div><div class="bval">' + fmtDate(rec.date) + '</div></div></div>' +
    '<div class="row2"><div class="box wide"><div class="bkey">Event / Project</div><div class="bval">' + (rec.project||'—') + '</div></div><div class="box"><div class="bkey">PO Ref</div><div class="bval" style="font-size:9px;">' + (rec.itemId||'—') + '</div></div></div>' +
    '<div class="purpose-box"><div class="bkey">Assigned Purpose</div><div class="bval' + (hasPurpose?'':' pending') + '">' + (hasPurpose ? rec.purpose : 'Pending client assignment') + '</div></div>' +
    '<div class="addr-box"><div class="bkey">Origin / Ship-From Address</div><div class="bval">' + (addr.join('<br>')||'—') + '</div></div>' +
    (rec.carrier ? '<div class="carrier-row"><div class="carr-name"><div class="bkey">Carrier</div><div class="bval">' + carrAbbr(rec.carrier) + '</div></div><div class="carr-track"><div class="bkey">Tracking #</div><div class="bval">' + (rec.tracking||'—') + '</div></div></div>' : '') +
    '<div class="count-row"><div class="count-box"><div class="bkey">Ctns</div><div class="bval">' + (rec.cartons||'0') + '</div></div><div class="count-box"><div class="bkey">Pallets</div><div class="bval">' + (rec.pallets||'0') + '</div></div><div class="count-box"><div class="bkey">Wt lb</div><div class="bval" style="font-size:14px;">' + (rec.weight||'0') + '</div></div><div class="count-box"><div class="bkey">Status</div><div class="bval" style="font-size:9px;">' + (rec.status||'—') + '</div></div></div>' +
    (rec.contents ? '<div class="contents-box"><div class="bkey">Contents</div><div class="bval">' + rec.contents + '</div></div>' : '') +
    (hasSpecial ? '<div class="special-box"><div class="bkey">Special Instructions</div><div class="bval">' + rec.instructions + '</div></div>' : '') +
    '<div class="handler-row"><div class="handler-box"><div class="h-init">' + initials(rec.handler) + '</div><div><div class="bkey">Received By</div><div class="h-name">' + (rec.handler||'—') + '</div></div></div><div class="box" style="text-align:right;"><div class="bkey">Invoice Code</div><div class="bval">' + (rec.invoiceCode||'—') + '</div></div></div>' +
    FOOT + '</div>';
}

function buildOutbound(rec){
  const addr=(rec.address||'').split('\n').map(l=>l.trim()).filter(Boolean);
  const hasSpecial = rec.instructions && rec.instructions.toUpperCase()!=='NONE' && rec.instructions.trim()!=='';
  return '<div class="lbl" data-dir="outbound">' +
    '<div class="id-strip"><img class="id-logo" src="' + LOGO_SRC + '" alt="HANDS Logistics"><div class="id-type">&#9650; OUTBOUND DISPATCH</div></div>' +
    '<div class="hero-box"><div class="hero-label">Event / Project</div><div class="hero-val">' + (rec.project||rec.account||'—') + '</div></div>' +
    '<div class="row2"><div class="box wide"><div class="bkey">Account / Brand</div><div class="bval lg">' + (rec.account||'—') + '</div></div><div class="box"><div class="bkey">Ship Date</div><div class="bval">' + fmtDate(rec.date) + '</div></div></div>' +
    '<div class="row2"><div class="box wide"><div class="bkey">Client Name</div><div class="bval">' + (rec.clientName||'—') + '</div></div><div class="box"><div class="bkey">PO Ref</div><div class="bval" style="font-size:9px;">' + (rec.itemId||'—') + '</div></div></div>' +
    '<div class="addr-box"><div class="bkey">Destination / Ship-To Address</div><div class="bval">' + (addr.join('<br>')||'—') + '</div></div>' +
    
    '<div class="count-row"><div class="count-box"><div class="bkey">Ctns</div><div class="bval">' + (rec.cartons||'0') + '</div></div><div class="count-box"><div class="bkey">Pallets</div><div class="bval">' + (rec.pallets||'0') + '</div></div><div class="count-box"><div class="bkey">Wt lb</div><div class="bval" style="font-size:14px;">' + (rec.weight||'0') + '</div></div><div class="count-box"><div class="bkey">Status</div><div class="bval" style="font-size:9px;">' + (rec.status||'—') + '</div></div></div>' +
    (rec.contents ? '<div class="contents-box"><div class="bkey">Contents</div><div class="bval">' + rec.contents + '</div></div>' : '') +
    (hasSpecial ? '<div class="special-box"><div class="bkey">Special Instructions</div><div class="bval">' + rec.instructions + '</div></div>' : '') +
    '<div class="row2"><div class="box"><div class="bkey">Shipped By</div><div class="bval">' + (rec.handler||'—') + '</div></div><div class="box" style="text-align:center;"><div class="bkey">Pieces</div><div class="bval" style="font-family:Bebas Neue,sans-serif;font-size:17px;">1 of 1</div></div></div>' +
    FOOT + '</div>';
}

</script>
</body>
</html>
