[build]
  publish = "public"
  functions = "netlify/functions"

[functions]
  node_bundler = "esbuild"

[[redirects]]
  from = "/api/send-confirmation"
  to = "/.netlify/functions/send-confirmation"
  status = 200

[[redirects]]
  from = "/api/send-pod"
  to = "/.netlify/functions/send-pod"
  status = 200

[[redirects]]
  from = "/api/monday-webhook"
  to = "/.netlify/functions/monday-webhook"
  status = 200

[[redirects]]
  from = "/api/preview"
  to = "/.netlify/functions/preview"
  status = 200

[[redirects]]
  from = "/api/claude-chat"
  to = "/.netlify/functions/claude-chat"
  status = 200

[[redirects]]
  from = "/api/create-paypal-link"
  to = "/.netlify/functions/create-paypal-link"
  status = 200

[[redirects]]
  from = "/api/paypal-webhook"
  to = "/.netlify/functions/paypal-webhook"
  status = 200

[[redirects]]
  from = "/api/send-io-notice"
  to = "/.netlify/functions/send-io-notice"
  status = 200

[[redirects]]
  from = "/api/assign-purpose"
  to = "/.netlify/functions/assign-purpose"
  status = 200

# Clean URL for the assign-purpose form
# Netlify query strings pass through automatically on redirects
[[redirects]]
  from = "/assign-purpose"
  to = "/assign-purpose.html"
  status = 200

[[redirects]]
  from = "/api/lookup-po"
  to = "/.netlify/functions/lookup-po"
  status = 200

# ── Phase 1: Schedule Delivery migration ──
[[redirects]]
  from = "/schedule"
  to = "/schedule.html"
  status = 200

[[redirects]]
  from = "/api/schedule-delivery"
  to = "/.netlify/functions/schedule-delivery"
  status = 200

# ── Phase 2: Label generator migration ──
[[redirects]]
  from = "/label"
  to = "/label.html"
  status = 200

[[redirects]]
  from = "/api/lookup-label"
  to = "/.netlify/functions/lookup-label"
  status = 200

[[redirects]]
  from = "/api/*"
  to = "/.netlify/functions/:splat"
  status = 200
